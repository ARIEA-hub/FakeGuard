version: "3.9"

services:
  api:
    build: .
    container_name: fakeguard_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models      # persist trained models
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build: .
    container_name: fakeguard_ui
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
    command: streamlit run src/app/streamlit_app.py
             --server.port 8501
             --server.address 0.0.0.0
             --server.headless true
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped